<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Chatbot</title>
  <style>
    body { font-family: Arial; background:#f5f5f5; text-align:center; }
    .box { background:white; padding:20px; margin:50px auto; width:300px; border-radius:10px; }
    input, textarea { width:90%; padding:10px; margin:8px 0; }
    button { padding:10px 20px; background:#4CAF50; color:white; border:none; cursor:pointer; }
  </style>
</head>
<body>

<div class="box">
  <h2>Create Your Chatbot</h2>

  <form method="POST">
    <input name="name" placeholder="Business Name" required><br>
    <input name="slug" placeholder="Endpoint (my-business)" required><br>
    <textarea name="content" placeholder="Enter FAQ / Info" required></textarea><br>

    <button type="submit">Generate Chatbot</button>
  </form>
</div>

</body>
</html>
