<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Success</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f7f6fb;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    h2 {
      color: #7c4dff;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      margin: 8px 0;
    }

    a {
      color: #7c4dff;
      text-decoration: none;
      font-weight: bold;
    }

    .btn {
      margin-top: 20px;
      display: inline-block;
      background: #7c4dff;
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
      text-decoration: none;
    }

    .btn:hover {
      background: #6a3df0;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Chatbot Created 🚀</h2>

  <p><b>Slug:</b> {{ slug }}</p>

  <p>
    Public URL:  
    <a href="/{{ slug }}" target="_blank">
      /{{ slug }}
    </a>
  </p>

  <br>

  <a href="/dashboard" class="btn">
    Go to Dashboard
  </a>
</div>

</body>
</html>
