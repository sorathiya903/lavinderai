<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Chatbot</title>

<style>
  
body {
  margin:0;
  font-family: Arial;
  background:#f7f6fb;
}

/* HEADER */
.header {
  background:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.title {
  font-size:18px;
  font-weight:bold;
  color:#7c4dff;
}

/* PROFILE */
.profile {
  position:relative;
  cursor:pointer;
}

.profile img {
  width:42px;
  height:42px;
  border-radius:50%;
  border:2px solid #7c4dff;
}

.dropdown {
  position:absolute;
  right:0;
  top:55px;
  background:white;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  padding:15px;
  width:180px;
  display:none;
  animation:fade 0.2s ease;
}

.dropdown button {
  width:100%;
  margin-top:8px;
  background:#7c4dff;
  border:none;
  color:white;
  padding:8px;
  border-radius:8px;
}

.dropdown .danger {
  background:red;
}

@keyframes fade {
  from {opacity:0; transform:translateY(-10px);}
  to {opacity:1; transform:translateY(0);}
}

/* FORM BOX */
.box {
  background:white;
  padding:25px;
  margin:60px auto;
  width:90%;
  max-width:400px;
  border-radius:14px;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
  animation:pop 0.3s ease;
}

@keyframes pop {
  from {transform:scale(0.95); opacity:0;}
  to {transform:scale(1); opacity:1;}
}

input, textarea {
  width:100%;
  padding:12px;
  margin:10px 0;
  border:1px solid #ddd;
  border-radius:10px;
  outline:none;
  transition:0.2s;
}

input:focus, textarea:focus {
  border-color:#7c4dff;
  box-shadow:0 0 0 2px rgba(124,77,255,0.1);
}

button {
  width:100%;
  padding:12px;
  background:#7c4dff;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  background:#6a3df0;
}

/* URL PREVIEW */
.preview {
  background:#f1efff;
  padding:12px;
  border-radius:10px;
  font-size:13px;
  margin-top:5px;
  min-height:40px;
  transition:0.2s;
}

.available {
  background-color: #007bff; /* Primary color */
  color: white;
  padding: 4px 8px;
  text-align: center;
  border-radius: 10px; /* High radius for pill shape */
  font-size: 12px;
  font-weight: bold;
  display: inline-block;
}

.notavailable {
  background-color: tomato; /* Primary color */
  color: white;
  padding: 4px 8px;
  text-align: center;
  border-radius: 10px; /* High radius for pill shape */
  font-size: 12px;
  font-weight: bold;
  display: inline-block;
}

#btn:disabled {
  background: #ccc;
  cursor: not-allowed;
  opacity: 0.7;
}
  .profile-menu {
  position: absolute;
  right: 20px;
  top: 70px;
  background: white;
  padding: 15px;
  border-radius: 12px;
  width: 220px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  display: none;
  z-index: 100;
}

.profile-menu a {
  display: block;
  margin-top: 10px;
  color: #7c4dff;
  text-decoration: none;
}

.profile-menu button {
  width: 100%;
  margin-top: 10px;
  background: red;
}

.profile-menu hr {
  border: none;
  border-top: 1px solid #eee;
  margin: 10px 0;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="title">Create a chatbot</div>

   <div class="profile" onclick="toggleMenu()">
    <img src="{{ picture }}" alt="">
  </div>

  <div id="profileMenu" class="profile-menu">
    <p><b>{{ user.name }}</b></p>
    <p style="font-size:12px;color:gray;">{{ user.email }}</p>

    <hr>

    <a href="/logout">Logout</a>

    <form method="POST" onsubmit="markSaved()" action="/delete-account" 
          onsubmit="return confirm('Delete your account permanently?');">
      <button class="danger">Delete Account</button>
    </form>
  </div>
</div>

<!-- FORM -->
<div class="box">
  <h2>Create Your Chatbot</h2>

  <form method="POST">
    <input name="name" placeholder="Business Name" required>

    <input id="slug" name="slug" placeholder="Endpoint (my-business)" required>

    <!-- URL PREVIEW -->
    <div class="preview" id="preview">
      Type endpoint to see URL...
    </div>

    <textarea name="content" placeholder="Enter FAQ / Info" required></textarea>

    <button id="btn" type="submit">Generate Chatbot</button>
  </form>
</div>

<script>

function toggleMenu() {
    let menu = document.getElementById("profileMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}
document.addEventListener("click", function(e) {
    let profile = document.querySelector(".profile");
    let menu = document.getElementById("profileMenu");

    if (!profile.contains(e.target) && !menu.contains(e.target)) {
        menu.style.display = "none";
    }
});
  
let timer = null;
let btn = document.getElementById("btn");
let slugInput = document.getElementById("slug");

slugInput.addEventListener("input", function() {
    let value = this.value.trim().toLowerCase().replace(/ /g, "-");

    clearTimeout(timer);

    timer = setTimeout(() => {
        if (!value) {
            btn.disabled = true;
            return;
        }

        let finalUrl = "https://ai-faq-chatbot-for-businesses.onrender.com" + "/" + value;

        fetch("/check-slug/" + value)
        .then(res => res.json())
        .then(data => {

            let available = data.available;

            let status = available 
                ? `<span class="available">available</span>`
                : `<span class="notavailable">not available</span>`;

            document.getElementById("preview").innerHTML = `
                You can get the url <b>${finalUrl}</b><br>
                The url <b>${value}</b> is ${status}
            `;

            btn.disabled = !available;
        });

    }, 500);
});
let isDirty = true; // assume user is editing

// detect form changes (optional but recommended)
document.addEventListener("input", () => {
    isDirty = true;
});

// BACK BUTTON / HISTORY CONTROL
window.onload = function () {
    history.pushState(null, "", window.location.href);
};

window.onpopstate = function () {
    if (isDirty) {
        let leave = confirm("You have unsaved changes. Do you want to leave this page?");
        
        if (leave) {
            window.location.href = "/dashboard";
        } else {
            history.pushState(null, "", window.location.href);
        }
    } else {
        window.location.href = "/dashboard";
    }
};

  
function markSaved() {
    isDirty = false;
}
window.addEventListener("beforeunload", function (e) {
    if (isDirty) {
        e.preventDefault();
        e.returnValue = "";
    }
});
</script>



</body>
</html>
