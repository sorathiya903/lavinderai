<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Chatbot</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #f5f7ff, #eef1ff);
}

/* HEADER */
.topbar {
  background: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #eee;
}

.topbar b {
  color: #7c4dff;
}

/* MAIN */
.container {
  max-width: 700px;
  margin: 20px auto;
  padding: 10px;
}

/* CARD */
.card {
  background: white;
  border-radius: 16px;
  padding: 15px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.05);
  display: flex;
  flex-direction: column;
  height: 75vh;
}

/* CHAT AREA */
.chatbox {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

/* MESSAGES */
.msg {
  margin: 10px 0;
  display: flex;
}

.msg.user {
  justify-content: flex-end;
}

.msg.bot {
  justify-content: flex-start;
}

.bubble {
  max-width: 70%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 14px;
}

.user .bubble {
  background: #7c4dff;
  color: white;
  border-bottom-right-radius: 4px;
}

.bot .bubble {
  background: #f1efff;
  color: #333;
  border-bottom-left-radius: 4px;
}

/* INPUT */
.input-area {
  display: flex;
  border-top: 1px solid #eee;
  padding-top: 10px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 12px 16px;
  border: none;
  border-radius: 10px;
  background: #7c4dff;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #6a3df0;
}

/* LIMIT BAR */
.limit-box {
  text-align: center;
  font-size: 12px;
  color: gray;
  margin-bottom: 5px;
}

/* LOADER */
.loader {
  font-size: 12px;
  color: gray;
  margin: 5px;
}
</style>
</head>

<body>

<div class="topbar">
  <b>Test Chatbot</b>
  <a href="/dashboard">← Back</a>
</div>

<div class="container">

  <div class="card">

    <!-- LIMIT -->
    <div id="limit" class="limit-box">5 free messages available</div>

    <!-- CHAT -->
    <div id="chatbox" class="chatbox"></div>

    <!-- INPUT -->
    <div class="input-area">
      <input id="msg" placeholder="Type a message..." />
      <button onclick="sendMessage()">Send</button>
    </div>

  </div>

</div>

<script>
let slug = "{{ slug }}";

function appendMessage(text, type) {
  let box = document.getElementById("chatbox");

  let div = document.createElement("div");
  div.className = "msg " + type;

  div.innerHTML = `<div class="bubble">${text}</div>`;
  box.appendChild(div);

  box.scrollTop = box.scrollHeight;
}

async function sendMessage() {

  let input = document.getElementById("msg");
  let msg = input.value.trim();

  if (!msg) return;

  appendMessage(msg, "user");
  input.value = "";

  let loader = document.createElement("div");
  loader.className = "loader";
  loader.innerText = "Typing...";
  document.getElementById("chatbox").appendChild(loader);

  let res = await fetch(`/api/chat/${slug}`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({message: msg})
  });

  let data = await res.json();

  loader.remove();

  appendMessage(data.reply, "bot");

  // update remaining
  if (data.remaining !== null) {
    document.getElementById("limit").innerText =
      `${data.remaining} messages left`;
  }

  // disable if limit over
  if (data.reply.includes("limit")) {
    document.getElementById("msg").disabled = true;
  }
}

// ENTER KEY SUPPORT
document.getElementById("msg").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    sendMessage();
  }
});
</script>

</body>
</html>
