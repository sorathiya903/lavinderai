<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body { font-family: Arial; background:#f5f5f5; text-align:center; }
    .box { background:white; padding:20px; margin:50px auto; width:300px; border-radius:10px; }
    input, textarea { width:90%; padding:10px; margin:8px 0; }
    button { padding:10px; background:#2196F3; color:white; border:none; }
  </style>
</head>
<body>

<div class="box">
  <h2>Edit Chatbot</h2>

  <form method="POST">
    <input name="name" value="{{ data.name }}" required><br>
    <textarea name="content">{{ data.content }}</textarea><br>

    <button type="submit">Update</button>
  </form>

  <hr>

  <p>Public Link:</p>
  <a href="/{{ slug }}" target="_blank">/{{ slug }}</a>
</div>

</body>
</html>
