<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ data.name }}</title>
  <style>
    body { font-family: Arial; background:#eef2f7; }
.chatbox {
  width: 90%;
  max-width: 400px;
  margin: 20px auto;
}
    .messages { height:200px; overflow-y:auto; border:1px solid #ccc; padding:10px; }
    input { width:75%; padding:8px; }
    button { padding:8px; }
  </style>
</head>
<body>

<div class="chatbox">
  <h2>{{ data.name }}</h2>
  <p>{{ data.content }}</p>

  <div class="messages" id="messages"></div>

  <input id="msg" placeholder="Type message...">
  <button onclick="send()">Send</button>
</div>

<script>
async function send() {
    let msg = document.getElementById("msg").value;
    let box = document.getElementById("messages");

    if (!msg) return;

    // show user message
    box.innerHTML += "<p><b>You:</b> " + msg + "</p>";

    try {
        let res = await fetch("/api/chat/{{ slug }}", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message: msg })
        });

        let data = await res.json();

        // show bot reply
        box.innerHTML += "<p><b>Bot:</b> " + data.reply + "</p>";
    } catch (err) {
        box.innerHTML += "<p><b>Bot:</b> Error connecting to server</p>";
    }

    document.getElementById("msg").value = "";
    box.scrollTop = box.scrollHeight;
}
  </script>

</body>
</html>
